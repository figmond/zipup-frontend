<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #1976d2; color: white; padding: 15px; text-align: center; }
    #map { height: 300px; }
    .container { padding: 15px; }
    input, select, button { width: 100%; margin: 5px 0; padding: 10px; }
    button { background: #1976d2; color: white; border: none; }
    .card { background: #f2f2f2; padding: 10px; margin: 10px 0; border-radius: 8px; }
  </style>
</head>

<body>

<header>📍 ZipUp</header>
<div id="map"></div>

<div class="container">

<h3>Wallet</h3>
<button onclick="loadWallet()">Check Balance</button>
<button onclick="addMoney()">Add ₹50</button>
<div id="wallet"></div>

<h3>Create Post</h3>

<select id="type">
  <option value="offer">Offer Help</option>
  <option value="need">Need Help</option>
</select>

<input id="title" placeholder="Enter details"/>
<input id="lat" placeholder="Latitude"/>
<input id="lng" placeholder="Longitude"/>
<input id="zip" placeholder="Zipcode"/>

<button onclick="useLocation()">📍 Use Location</button>
<button onclick="createPost()">Post</button>

<h3>Posts</h3>
<button onclick="loadPosts()">Refresh</button>
<div id="posts"></div>

<h3>Rate User</h3>
<input id="rateUser" placeholder="User ID"/>
<input id="stars" placeholder="Stars (1-5)"/>
<button onclick="rateUser()">Submit Rating</button>

</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";
let userId = 2;

let map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userLat = 13.0827;
let userLng = 80.2707;

// WALLET
async function loadWallet() {
  const res = await fetch(API + "/wallet/" + userId);
  const data = await res.json();
  document.getElementById("wallet").innerHTML = "Balance: ₹" + data.balance;
}

async function addMoney() {
  await fetch(API + "/wallet/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({user_id:userId, amount:50})
  });
  loadWallet();
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    document.getElementById("lat").value = userLat;
    document.getElementById("lng").value = userLng;
  });
}

// CREATE POST
async function createPost() {
  const body = {
    user_id: 1,
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    latitude: document.getElementById("lat").value,
    longitude: document.getElementById("lng").value,
    zipcode: document.getElementById("zip").value
  };

  await fetch(API + "/post", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });

  alert("Posted");
  loadPosts();
}

// LOAD POSTS WITH ⭐
async function loadPosts() {
  const res = await fetch(API + `/posts?lat=${userLat}&lng=${userLng}`);
  const data = await res.json();

  document.getElementById("posts").innerHTML = "";

  data.forEach(cluster => {
    cluster.posts.forEach(p => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${p.title}</b><br>
        ${p.type}<br>
        ⭐ Rating: ${p.rating}<br>
        📏 ${p.distance.toFixed(2)} km<br>
      `;

      document.getElementById("posts").appendChild(div);
    });
  });
}

// ⭐ RATE
async function rateUser() {
  const body = {
    from_user: userId,
    to_user: document.getElementById("rateUser").value,
    stars: document.getElementById("stars").value
  };

  await fetch(API + "/rate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });

  alert("Rated");
}
</script>

</body>
</html>
