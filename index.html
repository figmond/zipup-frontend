<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0;
      background: #f8f9fa;
    }
    
    #map { 
      height: 380px;        /* Broader map space */
      width: 100%;
    }
    
    .container {
      padding: 15px;
    }
    
    h3 {
      margin: 20px 0 10px 0;
      color: #333;
    }
    
    input, button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    
    button { 
      background: #2d7dd2; 
      color: white; 
      border: none; 
      cursor: pointer;
      font-weight: bold;
    }
    
    button:hover { 
      opacity: 0.9; 
    }
    
    /* Mode Buttons - Swiggy Style */
    .mode-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .mode-buttons button {
      flex: 1;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
    }
    
    #wallet {
      font-size: 18px;
      font-weight: bold;
      color: #2d7dd2;
      margin: 10px 0;
    }
    
    #posts {
      margin-top: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      min-height: 100px;
    }
  </style>
</head>

<body>

  <!-- Broader Map -->
  <div id="map"></div>

  <div class="container">

    <h3>Wallet</h3>
    <div id="wallet">Balance: ₹0</div>
    <button onclick="loadWallet()">Check Balance</button>
    <button onclick="addMoney()">Add ₹50</button>

    <h3>Create Post</h3>
    
    <!-- Mode Buttons -->
    <div class="mode-buttons">
      <button onclick="selectMode('help')" id="btnHelp" style="background: #f4c542; color: black;">
        🟡 Need Help
      </button>
      <button onclick="selectMode('helper')" id="btnHelper">
        🔵 Need Helper
      </button>
    </div>

    <!-- Ghost text input -->
    <input id="details" placeholder="Lost things / Need ride / Need charging / Need blood">

    <input id="lat" placeholder="Latitude">
    <input id="lng" placeholder="Longitude">
    <input id="zip" placeholder="Zipcode">

    <button onclick="useLocation()">📍 Use Current Location</button>
    <button onclick="createPost()">Post Now</button>

    <h3>Posts</h3>
    <button onclick="loadPosts()">Refresh Posts</button>
    <div id="posts"></div>

    <h3>Rate User</h3>
    <input id="rateUser" placeholder="User ID">
    <input id="stars" type="number" min="1" max="5" placeholder="Stars (1-5)">
    <button onclick="rateUserAction()">Submit Rating</button>

  </div>

<script>
const API = "https://zipup-backend-i796.onrender.com";
let userId = 2;
let mode = "help";

// MAP - Larger view
let map = L.map('map').setView([13.0827, 80.2707], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// SELECT MODE FUNCTION (Updated as per your requirement)
function selectMode(selected) {
  mode = selected;

  const input = document.getElementById("details");

  if (mode === "help") {
    document.getElementById("btnHelp").style.background = "#f4c542";
    document.getElementById("btnHelper").style.background = "#2d7dd2";

    input.placeholder = "Lost things / Need ride / Need charging / Need blood";
  } else {
    document.getElementById("btnHelper").style.background = "#2d7dd2";
    document.getElementById("btnHelp").style.background = "#ccc";

    input.placeholder = "Electrician / Plumber / Driver / Home nurse";
  }
}

// WALLET
async function loadWallet() {
  const res = await fetch(API + "/wallet/" + userId);
  const data = await res.json();
  document.getElementById("wallet").innerHTML = "Balance: ₹" + (data.balance || 0);
}

async function addMoney() {
  const res = await fetch(API + "/wallet/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: userId, amount: 50 })
  });

  const data = await res.json();
  if (data.error) {
    alert("Error: " + data.error);
  } else {
    document.getElementById("wallet").innerHTML = "Balance: ₹" + data.balance;
  }
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude.toFixed(6);
    document.getElementById("lng").value = pos.coords.longitude.toFixed(6);
  }, () => alert("Unable to get location"));
}

// CREATE POST - Updated validation
async function createPost() {
  const details = document.getElementById("details").value.trim();
  const lat = document.getElementById("lat").value;
  const lng = document.getElementById("lng").value;
  const zipcode = document.getElementById("zip").value;

  if (!details) {
    alert("Please enter details");
    return;
  }

  const res = await fetch(API + "/posts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: userId,
      type: mode,
      details: details,
      lat: lat,
      lng: lng,
      zipcode: zipcode
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Error: " + data.error);
  } else {
    alert("✅ Post created successfully!");
    loadPosts();
    
    // Reset fields
    document.getElementById("details").value = "";
    document.getElementById("lat").value = "";
    document.getElementById("lng").value = "";
    document.getElementById("zip").value = "";
  }
}

// LOAD POSTS
async function loadPosts() {
  const res = await fetch(API + "/posts");
  const data = await res.json();

  let html = "";
  data.forEach(p => {
    const typeLabel = p.type === 'help' ? '🟡 Need Help' : '🔵 Need Helper';
    html += `<div style="padding:10px; background:white; margin:8px 0; border-radius:8px;">
               <strong>${typeLabel}</strong><br>
               ${p.details}
             </div>`;
  });

  document.getElementById("posts").innerHTML = html || "<p>No posts available yet.</p>";
}

// RATE USER
async function rateUserAction() {
  const to_user = document.getElementById("rateUser").value;
  const stars = document.getElementById("stars").value;

  if (!to_user || !stars) {
    alert("Please enter User ID and Stars");
    return;
  }

  const res = await fetch(API + "/rate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      from_user_id: userId,
      to_user_id: to_user,
      stars: parseInt(stars)
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Error: " + data.error);
  } else {
    alert("✅ Rating submitted successfully");
    document.getElementById("rateUser").value = "";
    document.getElementById("stars").value = "";
  }
}

// Initialize on page load
window.onload = () => {
  selectMode("help");   // Start with Need Help mode
  loadWallet();
  loadPosts();
};
</script>

</body>
</html>
