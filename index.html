<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #1976d2; color: white; padding: 15px; text-align: center; }
    #map { height: 300px; }
    .container { padding: 15px; }

    input, select, button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #1976d2;
      color: white;
      border: none;
    }

    .post {
      background: #f1f1f1;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>📍 ZipUp</header>

<!-- ZIP POPUP -->
<div id="zipPopup" style="
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000000aa;
  display:flex;justify-content:center;align-items:center;
  z-index:1000;
">
  <div style="background:white;padding:20px;border-radius:10px;text-align:center;">
    <h3>Enter Zipcode</h3>
    <input id="zipcodeInput" placeholder="PIN code">
    <button onclick="saveZip()">ZipUp 🚀</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<div class="container">

  <h3>What do you need?</h3>

  <select id="type">
    <option value="offer">Offer Help → I give help to others</option>
    <option value="hire">Need Help → I need help from others</option>
  </select>

  <select id="category">
    <option>Electrician</option>
    <option>Plumber</option>
    <option>Driver</option>
    <option>Job</option>
    <option>Property</option>
    <option>Emergency</option>
    <option>Lost & Found</option>
  </select>

  <input id="title" placeholder="Enter details">
  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">

  <button onclick="useLocation()">📍 Use Location</button>
  <button onclick="createPost()">Post</button>

  <h3>Posts</h3>
  <button onclick="loadPosts()">Refresh</button>
  <div id="posts"></div>

</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";

let ZIP = localStorage.getItem("zip");

// MAP
const map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

// ZIP SAVE
function saveZip() {
  const val = document.getElementById("zipcodeInput").value;

  if (!val) return alert("Enter zipcode");

  localStorage.setItem("zip", val);
  ZIP = val;

  document.getElementById("zipPopup").style.display = "none";

  loadPosts();
}

// SHOW POPUP
if (!ZIP) {
  document.getElementById("zipPopup").style.display = "flex";
} else {
  document.getElementById("zipPopup").style.display = "none";
  loadPosts();
}

// LOAD POSTS
async function loadPosts() {
  if (!ZIP) return;

  const res = await fetch(API + "/posts/" + ZIP);
  const data = await res.json();

  document.getElementById("posts").innerHTML = "";

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    const typeText = p.type === "offer" ? "Offer Help" : "Need Help";

    div.innerHTML = `
      <b>${p.title}</b><br>
      ${typeText}<br>
      📍 ${p.latitude}, ${p.longitude}<br>
      <button onclick="deletePost(${p.post_id})">Delete</button>
    `;

    document.getElementById("posts").appendChild(div);

    const marker = L.circleMarker([p.latitude, p.longitude], { radius: 8 }).addTo(map);
    marker.bindPopup(p.title);
    markers.push(marker);
  });
}

// CREATE POST
async function createPost() {
  if (!ZIP) return alert("Enter zipcode first");

  const body = {
    user_id: 1,
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    latitude: document.getElementById("lat").value,
    longitude: document.getElementById("lng").value,
    zipcode: ZIP
  };

  await fetch(API + "/post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  alert("Posted");
  loadPosts();
}

// DELETE
async function deletePost(id) {
  await fetch(API + "/post/" + id, { method: "DELETE" });
  loadPosts();
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  });
}
</script>

</body>
</html>
