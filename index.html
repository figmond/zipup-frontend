<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #1976d2; color: white; padding: 15px; text-align: center; }
    #map { height: 300px; }
    .container { padding: 15px; }
    input, select, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }
    button { background: #1976d2; color: white; border: none; }
    .card {
      background: #f2f2f2;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>📍 ZipUp</header>

<div id="map"></div>

<div class="container">

<h3>What do you need?</h3>

<select id="type">
  <option value="offer">Offer Help</option>
  <option value="need">Need Help</option>
</select>

<input id="title" placeholder="Enter details"/>
<input id="lat" placeholder="Latitude"/>
<input id="lng" placeholder="Longitude"/>
<input id="zip" placeholder="Zipcode"/>

<button onclick="useLocation()">📍 Use Location</button>
<button onclick="createPost()">Post</button>

<h3>Posts</h3>
<button onclick="loadPosts()">Refresh</button>
<div id="posts"></div>

<h3>Inbox</h3>
<button onclick="loadRequests()">Load Requests</button>
<div id="requests"></div>

</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";

let map = L.map('map').setView([13.0827, 80.2707], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  });
}

async function createPost() {

  const body = {
    user_id: 1,
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    latitude: document.getElementById("lat").value,
    longitude: document.getElementById("lng").value,
    zipcode: document.getElementById("zip").value
  };

  await fetch(API + "/post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  alert("Posted");
  loadPosts();
}

async function loadPosts() {

  const res = await fetch(API + "/posts");
  const data = await res.json();

  document.getElementById("posts").innerHTML = "";

  data.forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    const timeLeft = Math.floor((p.expires_at - Date.now()) / 60000);

    div.innerHTML = `
      <b>${p.title}</b><br>
      ${p.type}<br>
      📍 ${p.latitude}, ${p.longitude}<br>
      ⏳ Expires in: ${timeLeft} mins<br>
      <button onclick="respond(${p.id})">Respond</button>
      <button onclick="deletePost(${p.id})">Delete</button>
    `;

    document.getElementById("posts").appendChild(div);
  });
}

async function deletePost(id) {
  await fetch(API + "/post/" + id, { method: "DELETE" });
  loadPosts();
}

async function respond(id) {
  await fetch(API + "/request", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ post_id: id, from_user: 2 })
  });

  alert("Request sent");
}

async function loadRequests() {
  const res = await fetch(API + "/requests");
  const data = await res.json();

  document.getElementById("requests").innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `Request for Post ID: ${r.post_id} from User: ${r.from_user}`;
    document.getElementById("requests").appendChild(div);
  });
}
</script>

</body>
</html>
