<!DOCTYPE html><html>
<head>
  <title>ZipUp</title>  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .post {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style></head><body><header>📍 ZipUp</header><div class="container">  <h3>Create Post</h3>  <input id="user_id" placeholder="User ID" />  <select id="type">
    <option value="lost">Lost</option>
    <option value="offer">Offer</option>
  </select>  <input id="title" placeholder="Title" />
  <input id="latitude" placeholder="Latitude" />
  <input id="longitude" placeholder="Longitude" /><button onclick="getLocation()">Use My Location</button>

<button onclick="createPost()">Submit</button>

  <h3>Posts</h3>
  <button onclick="loadPosts()">Refresh</button>  <div id="posts"></div></div><script>

const API = "https://zipup-backend-i796.onrender.com";

// CREATE POST
async function createPost() {
  const data = {
    user_id: parseInt(document.getElementById("user_id").value),
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    latitude: parseFloat(document.getElementById("latitude").value),
    longitude: parseFloat(document.getElementById("longitude").value)
  };

  await fetch(API + "/post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("Post added!");
  loadPosts();
}

// LOAD POSTS
async function loadPosts() {
  const res = await fetch(API + "/posts");
  const data = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="post">
        <b>${p.title}</b><br>
        Type: ${p.type}<br>
        📍 ${p.latitude}, ${p.longitude}<br>
        User: ${p.user_id}
      </div>
    `;
  });
}

// GET LOCATION
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("latitude").value = pos.coords.latitude;
    document.getElementById("longitude").value = pos.coords.longitude;
  });
}

// AUTO LOAD
loadPosts();
setInterval(loadPosts, 5000);

</script></body>
</html>
