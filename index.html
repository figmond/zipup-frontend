<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #1976d2; color: white; padding: 15px; text-align: center; }
    #map { height: 300px; }
    .container { padding: 15px; }

    input, select, button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #1976d2;
      color: white;
      border: none;
    }

    .post {
      background: #f1f1f1;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>📍 ZipUp</header>

<div id="map"></div>

<div class="container">

  <h3>What do you need?</h3>

  <select id="type">
    <option value="offer">Offer Help → I give help</option>
    <option value="hire">Need Help → I need help</option>
  </select>

  <input id="title" placeholder="Enter details">
  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">

  <button onclick="useLocation()">📍 Use Location</button>
  <button onclick="createPost()">Post</button>

  <h3>Posts</h3>
  <button onclick="loadPosts()">Refresh</button>
  <div id="posts"></div>

  <h3>Inbox</h3>
  <button onclick="loadInbox()">Load Requests</button>
  <div id="inbox"></div>

</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";

// MAP
const map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

// LOAD POSTS
async function loadPosts() {
  const res = await fetch(API + "/posts");
  const data = await res.json();

  document.getElementById("posts").innerHTML = "";

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${p.title}</b><br>
      ${p.type}<br>
      📍 ${p.latitude}, ${p.longitude}<br>

      <button onclick="respond(${p.post_id})">Respond</button>
      <button onclick="deletePost(${p.post_id})">Delete</button>
    `;

    document.getElementById("posts").appendChild(div);

    const marker = L.circleMarker([p.latitude, p.longitude], { radius: 8 }).addTo(map);
    marker.bindPopup(p.title);
    markers.push(marker);
  });
}

// CREATE POST
async function createPost() {
  const body = {
    user_id: 1,
    type: document.getElementById("type").value,
    title: document.getElementById("title").value,
    latitude: document.getElementById("lat").value,
    longitude: document.getElementById("lng").value
  };

  await fetch(API + "/post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  alert("Posted");
  loadPosts();
}

// RESPOND
async function respond(postId) {
  await fetch(API + "/request", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      post_id: postId,
      from_user: 2
    })
  });

  alert("Request sent");
}

// LOAD INBOX
async function loadInbox() {
  const res = await fetch(API + "/requests/1");
  const data = await res.json();

  const box = document.getElementById("inbox");
  box.innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      Request for Post ID: ${r.post_id} <br>
      From User: ${r.from_user}
    `;

    box.appendChild(div);
  });
}

// DELETE
async function deletePost(id) {
  await fetch(API + "/post/" + id, { method: "DELETE" });
  loadPosts();
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  });
}

loadPosts();
</script>

</body>
</html>
