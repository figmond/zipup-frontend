<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }
    #map { height: 250px; }
    .box { padding: 10px; }
    input, select, button { width: 100%; margin: 5px 0; padding: 10px; }
    button { background: #2d7dd2; color: white; border: none; }
  </style>
</head>

<body>

<div id="map"></div>

<div class="box">
  <h3>Wallet</h3>
  <div id="wallet">Balance: ₹0</div>
  <button onclick="loadWallet()">Check Balance</button>
  <button onclick="addMoney()">Add ₹50</button>

  <h3>Create Post</h3>
  <select id="type">
    <option>Offer Help</option>
    <option>Need Help</option>
  </select>

  <input id="details" placeholder="Enter details">
  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">
  <input id="zip" placeholder="Zipcode">

  <button onclick="useLocation()">📍 Use Location</button>
  <button onclick="createPost()">Post</button>

  <h3>Posts</h3>
  <button onclick="loadPosts()">Refresh</button>
  <div id="posts"></div>

  <h3>Rate User</h3>
  <input id="rateUser" placeholder="User ID">
  <input id="stars" type="number" min="1" max="5" placeholder="Stars">
  <button onclick="rateUser()">Submit Rating</button>
</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";
let userId = 2;

// MAP
let map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// WALLET
async function loadWallet() {
  const res = await fetch(API + "/wallet/" + userId);
  const data = await res.json();
  document.getElementById("wallet").innerHTML = "Balance: ₹" + data.balance;
}

async function addMoney() {
  const res = await fetch(API + "/wallet/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: userId,
      amount: 50
    })
  });

  const data = await res.json();
  document.getElementById("wallet").innerHTML = "Balance: ₹" + data.balance;
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  });
}

// CREATE POST
async function createPost() {
  const type = document.getElementById("type").value;
  const details = document.getElementById("details").value;
  const lat = document.getElementById("lat").value;
  const lng = document.getElementById("lng").value;
  const zipcode = document.getElementById("zip").value;

  const res = await fetch(API + "/posts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type, details, lat, lng, zipcode })
  });

  alert(await res.text());
}

// LOAD POSTS
async function loadPosts() {
  const res = await fetch(API + "/posts");
  const data = await res.json();

  let html = "";
  data.forEach(p => {
    html += `<div>${p.type} - ${p.details}</div>`;
  });

  document.getElementById("posts").innerHTML = html;
}

// RATE USER
async function rateUser() {
  const to_user = document.getElementById("rateUser").value;
  const stars = document.getElementById("stars").value;

  await fetch(API + "/rate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      from_user: userId,
      to_user,
      stars
    })
  });

  alert("Rated");
}
</script>

</body>
</html>
