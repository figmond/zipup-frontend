<!DOCTYPE html>
<html>
<head>
  <title>ZipUp</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 10px;
    }
    #map { height: 250px; }
    .box { padding: 15px; }
    input, select, button { 
      width: 100%; 
      margin: 8px 0; 
      padding: 12px; 
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button { 
      background: #2d7dd2; 
      color: white; 
      border: none; 
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }

    /* New Mode Buttons */
    .mode-buttons button {
      width: 48%;
      margin: 5px 1%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="box">

  <h3>Wallet</h3>
  <div id="wallet">Balance: ₹0</div>
  <button onclick="loadWallet()">Check Balance</button>
  <button onclick="addMoney()">Add ₹50</button>

  <h3>Create Post</h3>
  
  <!-- NEW MODE BUTTONS -->
  <div class="mode-buttons">
    <button onclick="selectMode('help')" id="btnHelp" style="background: #f4c542; color:black;">
      🟡 Need Help
    </button>
    <button onclick="selectMode('helper')" id="btnHelper">
      🔵 Need Helper
    </button>
  </div>

  <select id="details">
    <option>Select option</option>
  </select>

  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">
  <input id="zip" placeholder="Zipcode">

  <button onclick="useLocation()">📍 Use Location</button>
  <button onclick="createPost()">Post</button>

  <h3>Posts</h3>
  <button onclick="loadPosts()">Refresh</button>
  <div id="posts"></div>

  <h3>Rate User</h3>
  <input id="rateUser" placeholder="User ID">
  <input id="stars" type="number" min="1" max="5" placeholder="Stars">
  <button onclick="rateUserAction()">Submit Rating</button>

</div>

<script>
const API = "https://zipup-backend-i796.onrender.com";
let userId = 2;
let mode = "help";   // Default mode

// MAP
let map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// NEW MODE SELECTOR FUNCTION
function selectMode(selected) {
  mode = selected;

  const detailsSelect = document.getElementById("details");

  if (mode === "help") {
    document.getElementById("btnHelp").style.background = "#f4c542";
    document.getElementById("btnHelper").style.background = "#2d7dd2";

    detailsSelect.innerHTML = `
      <option>Select option</option>
      <option>Lost Things</option>
      <option>Need Ride</option>
      <option>Need Charging</option>
      <option>Need Room</option>
      <option>Need Blood</option>
    `;
  } else {
    document.getElementById("btnHelper").style.background = "#2d7dd2";
    document.getElementById("btnHelp").style.background = "#ccc";

    detailsSelect.innerHTML = `
      <option>Select option</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Security</option>
      <option>Driver</option>
      <option>Home Nurse</option>
    `;
  }
}

// WALLET
async function loadWallet() {
  const res = await fetch(API + "/wallet/" + userId);
  const data = await res.json();
  document.getElementById("wallet").innerHTML = "Balance: ₹" + (data.balance || 0);
}

async function addMoney() {
  const res = await fetch(API + "/wallet/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: userId, amount: 50 })
  });

  const data = await res.json();
  if (data.error) {
    alert("Error: " + data.error);
  } else {
    document.getElementById("wallet").innerHTML = "Balance: ₹" + data.balance;
  }
}

// LOCATION
function useLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById("lat").value = pos.coords.latitude;
    document.getElementById("lng").value = pos.coords.longitude;
  });
}

// UPDATED CREATE POST
async function createPost() {
  const details = document.getElementById("details").value;
  const lat = document.getElementById("lat").value;
  const lng = document.getElementById("lng").value;
  const zipcode = document.getElementById("zip").value;

  if (!details || details === "Select option") {
    alert("Please select a valid option");
    return;
  }

  const res = await fetch(API + "/posts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: userId,
      type: mode,        // Now using 'help' or 'helper'
      details,
      lat,
      lng,
      zipcode
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Error: " + data.error);
  } else {
    alert("✅ Post created successfully");
    loadPosts();
    // Reset fields after posting
    document.getElementById("details").value = "Select option";
    document.getElementById("lat").value = "";
    document.getElementById("lng").value = "";
    document.getElementById("zip").value = "";
  }
}

// LOAD POSTS
async function loadPosts() {
  const res = await fetch(API + "/posts");
  const data = await res.json();

  let html = "";
  data.forEach(p => {
    html += `<div><strong>${p.type === 'help' ? '🟡 Need Help' : '🔵 Need Helper'}</strong> - ${p.details}</div>`;
  });

  document.getElementById("posts").innerHTML = html || "<p>No posts yet.</p>";
}

// RATE USER
async function rateUserAction() {
  const to_user = document.getElementById("rateUser").value;
  const stars = document.getElementById("stars").value;

  if (!to_user || !stars) {
    alert("Please enter User ID and Stars");
    return;
  }

  const res = await fetch(API + "/rate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      from_user_id: userId,
      to_user_id: to_user,
      stars
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Error: " + data.error);
  } else {
    alert("✅ Rating submitted");
    document.getElementById("rateUser").value = "";
    document.getElementById("stars").value = "";
  }
}

// Initialize with default mode when page loads
window.onload = () => {
  selectMode("help");   // Default to "Need Help"
  loadWallet();
  loadPosts();
};
</script>

</body>
</html>
